name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - run: yarn install --frozen-lockfile

      - uses: supabase/setup-cli@v1

      - name: Push Supabase migrations (production)
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID_PROD }} && supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set Twilio Edge Function secrets (production)
        run: |
          if [[ -z "$TWILIO_ACCOUNT_SID" || -z "$TWILIO_AUTH_TOKEN" || -z "$TWILIO_VERIFY_SERVICE_SID" ]]; then
            echo "Skipping Twilio secret update because one or more TWILIO_* secrets are missing"
            exit 0
          fi
          supabase secrets set --project-ref "$SUPABASE_PROJECT_ID_PROD" \
            TWILIO_ACCOUNT_SID="$TWILIO_ACCOUNT_SID" \
            TWILIO_AUTH_TOKEN="$TWILIO_AUTH_TOKEN" \
            TWILIO_VERIFY_SERVICE_SID="$TWILIO_VERIFY_SERVICE_SID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID_PROD: ${{ secrets.SUPABASE_PROJECT_ID_PROD }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_VERIFY_SERVICE_SID: ${{ secrets.TWILIO_VERIFY_SERVICE_SID }}

      - name: Deploy auth Edge Functions (production)
        run: |
          supabase functions deploy auth-send-otp auth-verify-otp \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID_PROD }} \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Vercel production
        run: yarn dlx vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
